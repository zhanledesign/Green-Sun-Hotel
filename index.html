<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绿阳大饭店 | Green Sun Hotel - 现代高端版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2d4033; /* 对应图中的绿色元素 */
            --accent-gold: #c5a059;   /* 增加奢华感的金色 */
            --overlay: rgba(0, 0, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Noto Serif SC', serif; 
            background-color: #f9f8f4;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        /* 顶部导航：透明悬浮 */
        nav {
            position: absolute;
            top: 0; width: 100%; height: 120px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 6%; z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
            color: white;
        }

        .logo-box { text-align: left; }
        .logo-cn { font-size: 1.8rem; letter-spacing: 4px; font-weight: 500; }
        .logo-en { font-size: 0.8rem; letter-spacing: 2px; opacity: 0.8; }

        .nav-links { display: flex; list-style: none; gap: 40px; }
        .nav-links a { 
            color: white; text-decoration: none; font-size: 0.95rem; 
            transition: 0.3s; position: relative; padding-bottom: 5px;
        }
        .nav-links a:after {
            content: ''; position: absolute; width: 0; height: 1px; 
            bottom: 0; left: 0; background: var(--accent-gold); transition: 0.3s;
        }
        .nav-links a:hover:after { width: 100%; }

        .lang-btn { 
            border: 1px solid rgba(255,255,255,0.5); 
            padding: 6px 15px; font-size: 0.75rem; cursor: pointer;
            transition: 0.3s;
        }
        .lang-btn:hover { background: white; color: black; }

        /* 首屏：使用你上传的照片 */
        .hero {
            position: relative;
            height: 100vh;
            /* 这里直接引用你上传的建筑图 */
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://files.catbox.moe/6v0m0t.jpg') center/cover no-repeat;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }

        .hero-content h1 {
            font-size: 4.5rem; font-weight: 300; margin-bottom: 20px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: fadeInDown 1.5s ease;
        }
        
        .hero-content p {
            font-size: 1.2rem; letter-spacing: 8px; text-transform: uppercase;
            animation: fadeInUp 1.5s ease;
        }

        /* 核心信息区：白底雅致 */
        .info-section {
            padding: 100px 10%;
            background: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .info-text h2 { font-size: 2.2rem; margin-bottom: 30px; color: var(--primary-green); }
        .info-text p { font-size: 1.05rem; line-height: 2; color: #555; text-align: justify; }

        /* 底部浮动预订 */
        .book-now {
            position: fixed; bottom: 40px; right: 40px;
            background: var(--primary-green); color: white;
            padding: 18px 45px; border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer; z-index: 1000; transition: 0.4s;
            letter-spacing: 2px; font-weight: 500;
        }
        .book-now:hover { transform: scale(1.05); background: var(--accent-gold); }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo-box">
            <div class="logo-cn">绿阳大饭店</div>
            <div class="logo-en">GREEN SUN HOTEL</div>
        </div>
        <ul class="nav-links">
            <li><a href="#">关于我们</a></li>
            <li><a href="#">精品客房</a></li>
            <li><a href="#">美馔佳肴</a></li>
            <li><a href="#">会议宴会</a></li>
            <li><a href="#">地理位置</a></li>
        </ul>
        <div class="lang-btn">ENGLISH / 日本語</div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>静谧 · 优雅</h1>
            <p>为您开启一段非凡的居停旅程</p>
        </div>
    </section>

    <section class="info-section">
        <div class="info-text">
            <h2>欢迎来到绿阳</h2>
            <p>
                绿阳大饭店坐落于浙江省平湖市经济开发区，地理位置得天独厚，距离上海仅90公里。
                饭店占地面积达2万平方米，将现代化的建筑美学与细腻的款客之道完美融合。
                在这里，我们不仅为您提供舒适的休憩之所，更致力于打造一个远离喧嚣、回归自然的城市绿洲。
            </p>
            <div style="margin-top: 40px; height: 1px; width: 100px; background: var(--accent-gold);"></div>
        </div>
        <div class="info-visual">
            <img src="https://images.unsplash.com/photo-1544124499-58912cbddaad?q=80&w=800" alt="Interior" style="width: 100%; filter: grayscale(20%);">
        </div>
    </section>

    <div class="book-now">
        立即开启预订
    </div>

</body>
</html>
